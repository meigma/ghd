version = 1

[provenance]
signer_workflow = "meigma/ghd/.github/workflows/release.yml"

[[packages]]
name = "ghd-example"
description = "Small hello-world CLI used to demonstrate ghd-compatible publisher releases."
tag_pattern = "example-v${version}"

[[packages.assets]]
os = "darwin"
arch = "amd64"
pattern = "ghd-example_${version}_darwin_amd64"

[[packages.assets]]
os = "darwin"
arch = "arm64"
pattern = "ghd-example_${version}_darwin_arm64"

[[packages.assets]]
os = "linux"
arch = "amd64"
pattern = "ghd-example_${version}_linux_amd64"

[[packages.assets]]
os = "linux"
arch = "arm64"
pattern = "ghd-example_${version}_linux_arm64"

[[packages.binaries]]
path = "ghd-example"

name: Release Dry Run

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-dry-run:
    if: github.event_name != 'pull_request' || github.head_ref == 'feat/session-033-example-publisher-pipeline'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Create local dry-run component tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="0.0.0-dryrun.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
          tag="example-v${version}"

          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            -c tag.gpgSign=false \
            tag --annotate --message "temporary release dry-run tag" "${tag}" "${GITHUB_SHA}"

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Build release artifacts without publishing
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser-pro
          version: v2.15.4
          args: release --clean --skip=publish
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Validate dry-run artifact metadata
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${{ steps.version.outputs.version }}"
          mapfile -t binaries < <(jq -r '
            .[]
            | select(.type == "Binary")
            | select(.name | startswith("ghd-example_"))
            | .name
          ' dist/artifacts.json | sort)
          mapfile -t sboms < <(jq -r '
            .[]
            | select(.type == "SBOM")
            | .name
          ' dist/artifacts.json | sort)

          if [[ "${#binaries[@]}" -ne 4 ]]; then
            echo "expected 4 named binary artifacts, found ${#binaries[@]}" >&2
            jq . dist/artifacts.json >&2
            exit 1
          fi
          if [[ "${#sboms[@]}" -ne 4 ]]; then
            echo "expected 4 SBOM artifacts, found ${#sboms[@]}" >&2
            jq . dist/artifacts.json >&2
            exit 1
          fi

          for os in darwin linux; do
            for arch in amd64 arm64; do
              expected="ghd-example_${expected_version}_${os}_${arch}"
              if ! printf '%s\n' "${binaries[@]}" | grep -Fxq "${expected}"; then
                echo "missing binary artifact ${expected}" >&2
                printf '%s\n' "${binaries[@]}" >&2
                exit 1
              fi
              if ! printf '%s\n' "${sboms[@]}" | grep -Fxq "${expected}.sbom.json"; then
                echo "missing SBOM artifact ${expected}.sbom.json" >&2
                printf '%s\n' "${sboms[@]}" >&2
                exit 1
              fi
            done
          done

          jq -e '.[] | select(.type == "Checksum" and .name == "checksums.txt")' dist/artifacts.json >/dev/null
          test -s dist/checksums.txt

      - name: Smoke test dry-run binary version metadata
        shell: bash
        run: |
          set -euo pipefail

          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected_version="${{ steps.version.outputs.version }}"
          bin="$(find dist -type f -name ghd-example | grep "/ghd-example_${host_os}_${host_arch}_" | head -n 1 || true)"

          if [[ -z "${bin}" || ! -f "${bin}" ]]; then
            echo "failed to locate host binary in dist/" >&2
            find dist -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          version_output="$("${bin}" version)"
          flag_output="$("${bin}" --version)"
          hello_output="$("${bin}")"

          printf 'version output: %s\n' "${version_output}"
          printf 'flag output: %s\n' "${flag_output}"
          printf 'hello output: %s\n' "${hello_output}"

          [[ "${version_output}" == *"${expected_version}"* ]]
          [[ "${flag_output}" == *"${expected_version}"* ]]
          [[ "${hello_output}" == "hello from ghd-example" ]]

          for output in "${version_output}" "${flag_output}"; do
            [[ "${output}" =~ \([[:xdigit:]]{7,40}\)\ built\ [0-9]{4}-[0-9]{2}-[0-9]{2}T ]]
            [[ "${output}" != *"(none)"* ]]
            [[ "${output}" != *"built unknown"* ]]
          done

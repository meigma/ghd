name: Release

on:
  push:
    tags:
      - "v*"
      - "example-v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Resolve release component
        id: component
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          case "${tag}" in
            example-v*)
              version="${tag#example-v}"
              package_name="ghd-example"
              binary_name="ghd-example"
              asset_prefix="ghd-example_"
              goreleaser_config="example/.goreleaser.yaml"
              ;;
            v*)
              version="${tag#v}"
              package_name="ghd"
              binary_name="ghd"
              asset_prefix="ghd_"
              goreleaser_config=".goreleaser.yaml"
              ;;
            *)
              echo "expected a v* or example-v* tag, got ${tag}" >&2
              exit 1
              ;;
          esac

          if [[ -z "${version}" || "${version}" == "${tag}" ]]; then
            echo "could not resolve release version from ${tag}" >&2
            exit 1
          fi

          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "package_name=${package_name}" >>"${GITHUB_OUTPUT}"
          echo "binary_name=${binary_name}" >>"${GITHUB_OUTPUT}"
          echo "asset_prefix=${asset_prefix}" >>"${GITHUB_OUTPUT}"
          echo "goreleaser_config=${goreleaser_config}" >>"${GITHUB_OUTPUT}"

      - name: Wait for Release Please draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if draft="$(gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json isDraft --jq .isDraft 2>/dev/null)"; then
              if [[ "${draft}" == "true" ]]; then
                exit 0
              fi
              echo "release ${GITHUB_REF_NAME} exists but is not a draft" >&2
              exit 1
            fi
            sleep 5
          done

          echo "timed out waiting for Release Please draft ${GITHUB_REF_NAME}" >&2
          exit 1

      - name: Verify Apple signing secrets
        if: steps.component.outputs.package_name == 'ghd'
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in \
            MACOS_SIGN_P12 \
            MACOS_SIGN_PASSWORD \
            MACOS_NOTARY_KEY \
            MACOS_NOTARY_KEY_ID \
            MACOS_NOTARY_ISSUER_ID; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("${name}")
            fi
          done

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'missing required Apple signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          echo "Apple signing and notarization secrets are configured."

      - name: Build signed release artifacts
        if: steps.component.outputs.package_name == 'ghd'
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser-pro
          version: v2.15.4
          args: release --clean --skip=publish --config ${{ steps.component.outputs.goreleaser_config }}
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Build release artifacts
        if: steps.component.outputs.package_name != 'ghd'
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser-pro
          version: v2.15.4
          args: release --clean --skip=publish --config ${{ steps.component.outputs.goreleaser_config }}
        env:
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

      - name: Materialize named release assets
        env:
          ASSET_PREFIX: ${{ steps.component.outputs.asset_prefix }}
        shell: bash
        run: |
          set -euo pipefail

          jq -r --arg asset_prefix "${ASSET_PREFIX}" '
            .[]
            | select(.type == "Binary")
            | select(.name | startswith($asset_prefix))
            | [.path, .name]
            | @tsv
          ' dist/artifacts.json | while IFS=$'\t' read -r source name; do
            cp "${source}" "dist/${name}"
            chmod 0755 "dist/${name}"
          done

          (cd dist && shasum -a 256 -c checksums.txt)

      - name: Smoke test released binary version metadata
        env:
          BINARY_NAME: ${{ steps.component.outputs.binary_name }}
          EXPECTED_VERSION: ${{ steps.component.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          host_os="$(go env GOHOSTOS)"
          host_arch="$(go env GOHOSTARCH)"
          expected_version="${EXPECTED_VERSION}"
          binary_name="${BINARY_NAME}"
          bin="$(find dist -type f -name "${binary_name}" | grep "/${binary_name}_${host_os}_${host_arch}_" | head -n 1 || true)"

          if [[ -z "${bin}" || ! -f "${bin}" ]]; then
            echo "failed to locate host binary in dist/" >&2
            find dist -maxdepth 2 -type f | sort >&2
            exit 1
          fi

          flag_output="$("${bin}" --version)"

          printf 'flag output: %s\n' "${flag_output}"

          [[ "${flag_output}" == *"${expected_version}"* ]]
          [[ "${flag_output}" == "${binary_name} "* ]]

          [[ "${flag_output}" =~ \([[:xdigit:]]{7,40}\)\ built\ [0-9]{4}-[0-9]{2}-[0-9]{2}T ]]
          [[ "${flag_output}" != *"(none)"* ]]
          [[ "${flag_output}" != *"built unknown"* ]]

          if [[ "${binary_name}" == "ghd-example" ]]; then
            version_output="$("${bin}" version)"
            hello_output="$("${bin}")"
            printf 'version output: %s\n' "${version_output}"
            printf 'hello output: %s\n' "${hello_output}"
            [[ "${version_output}" == *"${expected_version}"* ]]
            [[ "${version_output}" =~ \([[:xdigit:]]{7,40}\)\ built\ [0-9]{4}-[0-9]{2}-[0-9]{2}T ]]
            [[ "${hello_output}" == "hello from ghd-example" ]]
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_PREFIX: ${{ steps.component.outputs.asset_prefix }}
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t assets < <(
            jq -r --arg asset_prefix "${ASSET_PREFIX}" '
              .[]
              | select(
                  (.type == "Binary" and (.name | startswith($asset_prefix))) or
                  (.type == "SBOM") or
                  (.type == "Checksum" and .name == "checksums.txt")
                )
              | "dist/" + .name
            ' dist/artifacts.json | sort
          )

          if [[ "${#assets[@]}" -ne 9 ]]; then
            echo "expected 9 release assets, found ${#assets[@]}" >&2
            printf '%s\n' "${assets[@]}" >&2
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" \
            "${assets[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

      - name: Attest released files listed in checksums.txt
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Mark draft release ready for human inspection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BINARY_NAME: ${{ steps.component.outputs.binary_name }}
          PACKAGE_NAME: ${{ steps.component.outputs.package_name }}
          VERSION: ${{ steps.component.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(gh release view "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets,isDraft,tagName,targetCommitish,url)"

          if [[ "$(jq -r '.isDraft' <<<"${release_json}")" != "true" ]]; then
            echo "release ${GITHUB_REF_NAME} is not a draft" >&2
            exit 1
          fi

          if ! jq -e '.assets[] | select(.name == "checksums.txt" and .state == "uploaded")' \
            <<<"${release_json}" >/dev/null; then
            echo "draft release is missing uploaded checksums.txt asset" >&2
            exit 1
          fi

          awk '{print $2 "\tsha256:" $1}' dist/checksums.txt | sort >expected-assets.tsv
          jq -r '
            .assets[]
            | select(.name != "checksums.txt")
            | [.name, .digest]
            | @tsv
          ' <<<"${release_json}" | sort >uploaded-assets.tsv

          if ! cmp -s expected-assets.tsv uploaded-assets.tsv; then
            echo "uploaded draft asset digests do not match dist/checksums.txt" >&2
            diff -u expected-assets.tsv uploaded-assets.tsv >&2 || true
            exit 1
          fi

          expected_count="$(wc -l <expected-assets.tsv | tr -d ' ')"
          uploaded_count="$(wc -l <uploaded-assets.tsv | tr -d ' ')"
          total_count="$(jq '.assets | length' <<<"${release_json}")"

          if [[ "${expected_count}" != "${uploaded_count}" || "${total_count}" != "9" ]]; then
            echo "expected ${expected_count} checksum-covered assets plus checksums.txt; found ${total_count} total assets" >&2
            exit 1
          fi

          release_url="$(jq -r '.url' <<<"${release_json}")"
          target_commitish="$(jq -r '.targetCommitish' <<<"${release_json}")"

          {
            echo "## Draft release ready for inspection"
            echo
            echo "- Repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Tag: \`${GITHUB_REF_NAME}\`"
            echo "- Package: \`${PACKAGE_NAME}\`"
            echo "- Target commit: \`${target_commitish}\`"
            echo "- Draft release: ${release_url}"
            echo "- Uploaded assets: ${total_count} total (${expected_count} checksum-covered assets plus \`checksums.txt\`)"
            echo
            echo "### Checksum-covered assets"
            echo
            echo "| Asset | SHA-256 |"
            echo "| --- | --- |"
            awk -F'\t' '{
              digest = $2
              sub(/^sha256:/, "", digest)
              printf "| `%s` | `%s` |\n", $1, digest
            }' expected-assets.tsv
            echo
            echo "### Inspect locally"
            echo
            echo '```sh'
            echo "tag=\"${GITHUB_REF_NAME}\""
            echo "repo=\"${GITHUB_REPOSITORY}\""
            echo 'tmp="$(mktemp -d)"'
            echo 'gh release view "${tag}" -R "${repo}" --json isDraft,isImmutable,tagName,targetCommitish,assets'
            echo 'gh release download "${tag}" -R "${repo}" -D "${tmp}" --pattern "*"'
            echo '(cd "${tmp}" && shasum -a 256 -c checksums.txt)'
            echo "asset=\"${BINARY_NAME}_${VERSION}_\$(go env GOOS)_\$(go env GOARCH)\""
            echo 'gh attestation verify "${tmp}/${asset}" --repo "${repo}" --signer-workflow "${repo}/.github/workflows/release.yml" --source-ref "refs/tags/${tag}" --deny-self-hosted-runners'
            echo '```'
            echo
            echo "### Publish after inspection"
            echo
            echo '```sh'
            echo "gh release edit \"${GITHUB_REF_NAME}\" -R \"${GITHUB_REPOSITORY}\" --draft=false --latest=false"
            echo '```'
            echo
            echo "### Reject before publication"
            echo
            echo '```sh'
            echo "gh release delete \"${GITHUB_REF_NAME}\" -R \"${GITHUB_REPOSITORY}\" --cleanup-tag"
            echo '```'
            echo
            echo "Rejected drafts may leave stale GitHub-native artifact attestations. That is expected and tolerated because consumers still require immutable release attestation plus provenance."
          } >>"${GITHUB_STEP_SUMMARY}"

      - name: Mint Homebrew tap token
        if: steps.component.outputs.package_name == 'ghd'
        id: tap-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.PACKAGING_APP_CLIENT_ID }}
          private-key: ${{ secrets.PACKAGING_APP_PRIVATE_KEY }}
          owner: meigma
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout Homebrew tap
        if: steps.component.outputs.package_name == 'ghd'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: meigma/homebrew-tap
          ref: main
          path: homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}
          persist-credentials: true

      - name: Open Homebrew tap pull request
        if: steps.component.outputs.package_name == 'ghd'
        id: homebrew-tap-pr
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          PACKAGING_APP_ID: ${{ vars.PACKAGING_APP_ID }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          cask_source="${GITHUB_WORKSPACE}/dist/homebrew/Casks/ghd.rb"
          tap_dir="${GITHUB_WORKSPACE}/homebrew-tap"

          if [[ ! -f "${cask_source}" ]]; then
            echo "expected generated cask at ${cask_source}" >&2
            exit 1
          fi

          safe_tag="$(tr -c '[:alnum:]._-' '-' <<<"${RELEASE_TAG}" | sed 's/-$//')"
          branch="ghd-${safe_tag}"

          cd "${tap_dir}"
          git config user.name "meigma-packaging-app[bot]"
          git config user.email "${PACKAGING_APP_ID}+meigma-packaging-app[bot]@users.noreply.github.com"
          git switch -C "${branch}" origin/main

          mkdir -p Casks
          cp "${cask_source}" Casks/ghd.rb
          git add Casks/ghd.rb

          if git diff --cached --quiet -- Casks/ghd.rb; then
            echo "No Homebrew cask changes to publish"
            echo "url=" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          git commit -m "ghd ${RELEASE_TAG}"
          git push --force-with-lease --set-upstream origin "${branch}"

          body_file="$(mktemp)"
          {
            echo "Updates the generated \`ghd\` cask for \`${RELEASE_TAG}\`."
            echo
            echo "Do not merge this PR until the corresponding \`meigma/ghd\` draft release has been published."
            echo
            echo "Release: https://github.com/meigma/ghd/releases/tag/${RELEASE_TAG}"
          } >"${body_file}"

          pr_json="$(gh pr list \
            --repo meigma/homebrew-tap \
            --head "${branch}" \
            --base main \
            --state open \
            --json number,url \
            --jq '.[0] // empty')"

          if [[ -n "${pr_json}" ]]; then
            pr_number="$(jq -r '.number' <<<"${pr_json}")"
            pr_url="$(jq -r '.url' <<<"${pr_json}")"
            gh pr edit "${pr_number}" \
              --repo meigma/homebrew-tap \
              --title "ghd ${RELEASE_TAG}" \
              --body-file "${body_file}"
          else
            pr_url="$(gh pr create \
              --repo meigma/homebrew-tap \
              --base main \
              --head "${branch}" \
              --title "ghd ${RELEASE_TAG}" \
              --body-file "${body_file}")"
          fi

          echo "url=${pr_url}" >>"${GITHUB_OUTPUT}"

      - name: Summarize Homebrew tap pull request
        if: steps.component.outputs.package_name == 'ghd' && steps.homebrew-tap-pr.outputs.url != ''
        env:
          HOMEBREW_TAP_PR_URL: ${{ steps.homebrew-tap-pr.outputs.url }}
        shell: bash
        run: |
          {
            echo
            echo "## Homebrew tap PR"
            echo
            echo "Merge after publishing the draft release: ${HOMEBREW_TAP_PR_URL}"
          } >>"${GITHUB_STEP_SUMMARY}"

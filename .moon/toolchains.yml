# Active toolchains for ghd.
# The docs project uses npm today. Add Go tooling here when the CLI
# implementation lands.

javascript:
  packageManager: 'npm'
  inferTasksFromScripts: true

npm: {}

node:
  version: '22.22.2'
  syncVersionManagerConfig: 'nvm'

# Swap npm for pnpm, yarn, bun, or deno if the docs tooling changes.
# javascript:
#   packageManager: 'pnpm'
#   inferTasksFromScripts: true
#
# pnpm:
#   version: '<version>'
#
# bun:
#   version: '<version>'
#
# deno:
#   version: '<version>'

# Stable non-JavaScript toolchains in Moon v2.
go: {}

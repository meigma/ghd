language: 'typescript'
layer: 'application'
stack: 'frontend'
tags:
  - 'docs'
  - 'docusaurus'

project:
  title: 'ghd docs'
  description: 'Docusaurus documentation site for GitHub Downloader.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

toolchains:
  default: 'node'

fileGroups:
  configs:
    - 'docusaurus.config.ts'
    - 'tsconfig.json'
    - 'package.json'
    - 'package-lock.json'
  sources:
    - 'docs/**/*'
    - 'src/**/*'
    - 'static/**/*'

# Moon infers tasks from package.json scripts because
# javascript.inferTasksFromScripts is enabled in /.moon/toolchains.yml.
# Only build and typecheck are CI checks; the remaining Docusaurus scripts are
# interactive, mutating, or deployment-oriented utilities.
tasks:
  clear:
    options:
      runInCI: false

  deploy:
    options:
      runInCI: false

  docusaurus:
    options:
      runInCI: false

  serve:
    options:
      runInCI: false

  start:
    options:
      runInCI: false

  swizzle:
    options:
      runInCI: false

  write-heading-ids:
    options:
      runInCI: false

  write-translations:
    options:
      runInCI: false

# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
pro: true

project_name: ghd

before:
  hooks:
    - go test ./...

builds:
  - id: ghd
    main: ./cmd/ghd
    binary: ghd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -buildid=
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    hooks:
      post:
        - cmd: ./.github/scripts/quill-sign-darwin.sh "{{ .Target }}" "{{ .Path }}"

archives:
  - id: ghd
    ids:
      - ghd
    formats:
      - binary
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: binary

release:
  draft: true
  use_existing_draft: true
  replace_existing_artifacts: true
  make_latest: false
  mode: keep-existing

homebrew_casks:
  - name: ghd
    ids:
      - ghd
    repository:
      owner: meigma
      name: homebrew-tap
      branch: main
    url:
      template: "https://github.com/meigma/ghd/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_msg_template: "brew cask update for {{ .ProjectName }} {{ .Tag }}"
    homepage: "https://github.com/meigma/ghd"
    description: "Verified GitHub release asset downloader"
    binaries:
      - ghd
    skip_upload: true

changelog:
  disable: true

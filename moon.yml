layer: 'scaffolding'

project:
  title: 'ghd'
  description: 'Workspace-level configuration, documentation, and automation for GitHub Downloader.'
  owner: 'meigma'
  maintainers:
    - 'meigma'

workspace:
  inheritedTasks:
    include: []

tasks:
  test:
    command: 'go test ./...'
    toolchains: ['go']
    inputs:
      - 'go.mod'
      - 'go.sum'
      - 'internal/**/*.go'
    options:
      cache: false

